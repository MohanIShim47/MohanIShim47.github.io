---
layout: default
title: Blog
---

<h1>Latest Posts</h1>

<ul class="posts">
  {% for post in site.posts %}
    <div class="grid">
      <div class="card">
        <h3>{{ post.title }} by {{ post.author }}</h3>
        <span>{{ post.date | date: "%b %d, %Y" }}</span>
        <p>{{ post.excerpt }}</p>
        <a href="{{ post.url }}" class="btn-card">Go to Post</a>
      </div>
    </div>
  {% endfor %}
</ul>
